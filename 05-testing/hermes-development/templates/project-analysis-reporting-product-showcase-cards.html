<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Showcase · Card Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: #f4f1ea;
  color: #1a1a1a;
  line-height: 1.6;
  padding: 40px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

header {
  text-align: center;
  margin-bottom: 48px;
}

header h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

header p {
  color: #666;
  font-size: 15px;
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  padding-left: 8px;
  border-left: 3px solid #1a1a1a;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}

.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

.card-image {
  width: 100%;
  aspect-ratio: 3/4;
  background: #e8e4dc;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-image-placeholder {
  color: #999;
  font-size: 14px;
  text-align: center;
  padding: 20px;
}

.card-tag {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}

.card-body {
  padding: 16px 18px 18px;
}

.card-label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.card-prompt {
  font-size: 13px;
  color: #333;
  line-height: 1.7;
  font-family: 'SF Mono', 'Menlo', monospace;
  background: #f7f6f3;
  padding: 10px 12px;
  border-radius: 8px;
  border-left: 2px solid #ddd;
  max-height: 120px;
  overflow-y: auto;
}

.card-meta {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #eee;
}

.card-meta-item {
  font-size: 12px;
  color: #666;
}

.card-meta-item strong {
  color: #1a1a1a;
}

@media (max-width: 640px) {
  .cards-grid {
    grid-template-columns: 1fr;
  }
  body {
    padding: 24px 16px;
  }
  header h1 {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<div class="container">

<header>
  <h1>Product Name · Showcase</h1>
  <p>One-line description of the product</p>
</header>

<!-- Section template -->
<h2 class="section-title">Category Name</h2>
<div class="cards-grid">

  <!-- Card template -->
  <div class="card">
    <div class="card-image">
      <span class="card-tag">Tag Label</span>
      <!-- Replace with actual image: -->
      <!-- <img src="assets/image_01.png" alt="Description"> -->
      <div class="card-image-placeholder">[Replace with image]<br>Width×Height</div>
    </div>
    <div class="card-body">
      <div class="card-label">Prompt</div>
      <div class="card-prompt">The full prompt text goes here. This area is scrollable if the prompt is long.</div>
      <div class="card-meta">
        <span class="card-meta-item"><strong>Key:</strong> Value</span>
        <span class="card-meta-item"><strong>Key:</strong> Value</span>
      </div>
    </div>
  </div>

</div>

</div>

</body>
</html>
