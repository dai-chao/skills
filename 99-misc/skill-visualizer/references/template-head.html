/* 核心文件解读 */
.skill-hero{display:flex;align-items:center;gap:var(--space-6);padding:var(--space-6);background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border-light);box-shadow:var(--shadow-sm);margin-bottom:var(--space-8)}
