<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告标题</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e5e5ea;
        }
        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 10px;
        }
        .header .subtitle { color: #999; font-size: 1.1em; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .summary-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e5e5ea;
            text-align: center;
            transition: transform 0.2s;
        }
        .summary-card:hover { transform: translateY(-4px); }
        .summary-card .icon { font-size: 2em; margin-bottom: 10px; }
        .summary-card h3 {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .summary-card .value {
            font-size: 2.2em;
            font-weight: 700;
            color: #1d1d1f;
        }
        .summary-card .sub {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
        }
        .card-accent { border-top: 3px solid #ff6b35; }

        .charts-section { margin-bottom: 40px; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }
        .chart-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e5e5ea;
        }
        .chart-card h3 {
            font-size: 1em;
            color: #ff6b35;
            margin-bottom: 16px;
        }
        .chart-container { position: relative; height: 280px; }
        .chart-full { grid-column: 1 / -1; }
        .chart-full .chart-container { height: 320px; }

        .analysis-section {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #e5e5ea;
            margin-bottom: 40px;
        }
        .analysis-section h2 {
            font-size: 1.3em;
            color: #ff6b35;
            margin-bottom: 20px;
        }
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .analysis-item {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            border-left: 3px solid #ff6b35;
        }
        .analysis-item h4 {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 8px;
        }
        .analysis-item p {
            font-size: 1.1em;
            color: #1d1d1f;
            line-height: 1.5;
        }
        .analysis-item .highlight { color: #ff6b35; font-weight: 600; }

        .date-section {
            margin-bottom: 30px;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e5e5ea;
        }
        .date-header {
            background: linear-gradient(90deg, #ff6b35, #e85d04);
            padding: 16px 24px;
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            color: #fff;
        }
        .date-header .left { display: flex; align-items: center; gap: 10px; }
        .date-header .toggle-icon {
            transition: transform 0.3s;
            font-size: 0.8em;
        }
        .date-header.collapsed .toggle-icon { transform: rotate(-90deg); }
        .date-content {
            max-height: 20000px;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .date-content.collapsed { max-height: 0; }

        .user-section {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        .user-section:last-child { border-bottom: none; }
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            user-select: none;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8em;
            color: #fff;
        }
        .user-info { flex: 1; }
        .user-id { font-size: 1em; font-weight: 600; color: #1d1d1f; }
        .user-stats {
            font-size: 0.8em;
            color: #999;
            margin-top: 3px;
        }
        .user-stats span { margin-right: 16px; }
        .user-stats .highlight { color: #ff6b35; font-weight: 600; }
        .user-toggle { font-size: 0.8em; transition: transform 0.3s; }
        .user-header.collapsed .user-toggle { transform: rotate(-90deg); }
        .user-content {
            max-height: 20000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .user-content.collapsed { max-height: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        th {
            background: #fafafa;
            color: #ff6b35;
            font-weight: 600;
            text-align: left;
            padding: 10px 14px;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #1d1d1f;
        }
        tr:hover td { background: #f5f5f7; }
        .model-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.8em;
            font-weight: 500;
            background: #eef2ff;
            color: #667eea;
            border: 1px solid #dbe4ff;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #999;
            font-size: 0.85em;
        }

        @media print {
            body { background: #fff; color: #333; }
            .date-section, .chart-card, .analysis-section, .summary-card { background: #fff; border: 1px solid #ddd; }
            .header { background: #fff; }
            th { background: #e9ecef; color: #333; }
            td { color: #333; border-bottom: 1px solid #eee; }
            .user-id { color: #333; }
            .model-badge { border: 1px solid #ccc; }
            .date-content, .user-content { max-height: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>报告标题</h1>
            <div class="subtitle">数据周期 | 记录数 | 用户数</div>
        </div>

        <div class="summary-grid">
            <div class="summary-card card-accent">
                <div class="icon">📊</div>
                <h3>总调用次数</h3>
                <div class="value">0</div>
                <div class="sub">全部记录</div>
            </div>
        </div>

        <div class="charts-section">
            <div class="charts-grid">
                <div class="chart-card chart-full">
                    <h3>📈 趋势图</h3>
                    <div class="chart-container"><canvas id="mainChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="analysis-section">
            <h2>📋 数据洞察</h2>
            <div class="analysis-grid">
                <div class="analysis-item">
                    <h4>分析项</h4>
                    <p>内容 <span class="highlight">高亮</span></p>
                </div>
            </div>
        </div>

        <div class="date-section">
            <div class="date-header" onclick="toggleDate(this)">
                <div class="left"><span>📅</span><span>日期</span></div>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="date-content collapsed">
                <div class="user-section">
                    <div class="user-header" onclick="toggleUser(event, this)">
                        <div class="user-avatar">U</div>
                        <div class="user-info">
                            <div class="user-id">用户</div>
                            <div class="user-stats">统计</div>
                        </div>
                        <span class="user-toggle">▼</span>
                    </div>
                    <div class="user-content collapsed">
                        <table>
                            <thead><tr><th>时间</th><th>模型</th><th>用户</th></tr></thead>
                            <tbody><tr><td>00:00:00</td><td><span class="model-badge">model</span></td><td>uid</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer"><p>报告生成时间</p></div>
    </div>

    <script>
        function toggleDate(el) {
            el.classList.toggle('collapsed');
            el.nextElementSibling.classList.toggle('collapsed');
        }
        function toggleUser(e, el) {
            e.stopPropagation();
            el.classList.toggle('collapsed');
            el.nextElementSibling.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
